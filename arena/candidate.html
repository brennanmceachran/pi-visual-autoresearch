<main class="frame" aria-label="candidate surface">
  <h1 class="headline">
    What do you want to <span class="highlight">hallucinate</span> today?
  </h1>
  <p class="tagline">Your bugs, delivered faster</p>
  <div class="input-box">
    <textarea placeholder="Describe your billion dollar idea..."></textarea>
    <div class="input-footer">
      <button class="submit-btn" aria-Label="Submit">&#8593;</button>
    </div>
  </div>
  <div class="suggestions">
    <button class="pill">&#8593; Technical debt</button>
    <button class="pill">&#8593; Spaghetti code</button>
    <button class="pill">&#8593; It works locally</button>
  </div>
</main>
