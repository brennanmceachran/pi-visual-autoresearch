function buildHeatmap(section) {
  const wrap = document.createElement('section');
  wrap.className = `section accent-${section.accent}`;

  wrap.innerHTML = `
    <div class="top">
      <h2>${section.title}</h2>
      <div class="stats">
        ${section.metrics.map(([label, value]) => `
          <div class="stat"><div class="label">${label}</div><div class="value">${value}</div></div>
        `).join('')}
      </div>
    </div>
    <div class="months">${months.map(m => `<span>${m}</span>`).join('')}</div>
    <div class="chart-wrap">
      <div class="week-labels"><span>Mon</span><span>Sun</span></div>
      <div class="grid"></div>
    </div>
    ${section.note ? `<div class="note">${section.note}</div>` : ''}
    <div class="legend"><span>LESS</span><div class="chips"></div><span>MORE</span></div>
    <div class="footer">
      ${section.footer.map(([label, value, sub]) => `
        <div class="foot-item">
          <div class="label">${label}</div>
          <div class="foot-value">${value} ${sub ? `<span>${sub}</span>` : ''}</div>
        </div>
      `).join('')}
    </div>
  `;

  const grid = wrap.querySelector('.grid');
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell lvl-0';
      const startRow = c < 1 ? 0 : (c < 39 ? 1 : 0);
      if (r < startRow) cell.classList.add('blank');
      const level = section.cells[`${c},${r}`];
      if (!cell.classList.contains('blank') && level) cell.className = `cell lvl-${level}`;
      grid.appendChild(cell);
    }
  }

  const chips = wrap.querySelector('.chips');
  for (let i = 0; i < 5; i++) {
    const chip = document.createElement('div');
    chip.className = `chip lvl-${i}`;
    chips.appendChild(chip);
  }

  return wrap;
}

sections.forEach((section) => app.appendChild(buildHeatmap(section)));
